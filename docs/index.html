<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fami tour calc by Tim</title>
    <style>
      html,
      body {
        padding: 2vh 2vw;
        margin: 0;
        font-size: 24px;
      }

      #calc {
        display: flex;
        gap: 24px;
      }

      #calc > div {
        flex: 1;
        margin: 0;
      }

      button {
        height: 56px;
        font-size: 24px;
      }

      input[type='text'],
      input[type='number'] {
        width: 50px;
        height: 50px;
        font-size: 24px;

        border: 1px solid #ccc;
        padding: 2px;
      }

      input[type='radio'] {
        width: 30px;
        height: 30px;
      }

      label {
        display: inline-flex;
        align-items: center;
        vertical-align: middle;
      }

      div + div {
        margin-top: 24px;
      }

      #setpanel {
        margin-bottom: 24px;
        zoom: 0.75;
      }

      .tracker-line {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }
    </style>
  </head>
  <body>
    <details open>
      <summary>fami wave</summary>
      <details id="setpanel">
        <summary>Set Preset</summary>
        Preset No:
        <input type="text" value="1" id="setpresetNo" />
        <hr />
        ty:always=1,odd=2,even=3
        <hr />
        Card 1: +
        <input type="text" id="setpresetCard1-to" />
        x
        <input type="text" id="setpresetCard1-fi" />
        ty
        <input type="number" id="setpresetCard1-ty" value="1" />
        cn
        <input type="number" id="setpresetCard1-cn" />
        <hr />
        Card 2: +
        <input type="text" id="setpresetCard2-to" />
        x
        <input type="text" id="setpresetCard2-fi" />
        ty
        <input type="number" id="setpresetCard2-ty" value="1" />
        cn
        <input type="number" id="setpresetCard2-cn" />
        <hr />
        Card 3: +
        <input type="text" id="setpresetCard3-to" />
        x
        <input type="text" id="setpresetCard3-fi" />
        ty
        <input type="number" id="setpresetCard3-ty" value="1" />
        cn
        <input type="number" id="setpresetCard3-cn" />
        <hr />
        <button onclick="setupPreset()">Set Up</button>
        <button onclick="clearPreset()">Clear</button>
      </details>
      <div>
        <button onclick="loadPreset(1)">Preset 1</button>
        <button onclick="loadPreset(2)">Preset 2</button>
        <button onclick="loadPreset(3)">Preset 3</button>
        <button
          onclick="booooom()"
          style="background-color: rgba(255, 47, 47, 0.778); color: rgba(255, 255, 35, 0.842)">
          Booooooom
        </button>
      </div>
      <div id="calc"></div>
      <div style="display: flex; align-items: center; gap: 5px">
        Adjustment: +
        <input type="text" id="total" value="0" />
        x
        <input type="text" id="final" value="0" />
        <button onclick="setRes()">Calc</button>
      </div>
      <div id="res"></div>
    </details>
    <details>
      <summary>
        egg tracker
        <button style="zoom: 0.75" onclick="saveTracker()">save tracker</button>
        <button style="zoom: 0.75" onclick="clearTracker()">clear</button>
      </summary>
      <div id="egg"></div>
    </details>
    <script>
      const calc = document.querySelector('#calc');
      const setpanel = document.querySelector('#setpanel');
      const setpresetNo = document.querySelector('#setpresetNo');
      const res = document.querySelector('#res');
      const total = document.querySelector('#total');
      const final = document.querySelector('#final');
      const setRes = () => {
        res.innerHTML = '';
        let resT = 0;
        let resStrT = '';
        let resF = 0;
        let resStrF = '';

        [1, 2, 3].forEach(no => {
          const cond =
            document.querySelector('input[name="trigger-' + no + '"]:checked')?.value || '';
          const condNo = +(document.querySelector('#trigger-' + no + '-no')?.value || '');
          const condVal = +(
            document.querySelector('input[name="trigger-' + condNo + '-dice"]:checked')?.value || ''
          );
          const dice = +(
            document.querySelector('input[name="trigger-' + no + '-dice"]:checked')?.value || ''
          );
          const to = +(document.querySelector('#trigger-' + no + '-total')?.value || '');
          const fi = +(document.querySelector('#trigger-' + no + '-final')?.value || '');

          resT += dice;
          resStrT += ' + ' + dice;
          if (
            cond === 'always' ||
            (cond === 'odd' && condVal % 2 === 1) ||
            (cond === 'even' && condVal % 2 === 0)
          ) {
            resT += to;
            resF += fi;
            resStrT += ' + ' + to;
            resStrF += ' + ' + fi;
            res.innerHTML += `${no}:${cond}, dice:${dice},+${to},x${fi}<br>`;
          } else {
            res.innerHTML += `${no}:${cond}, dice:${dice}<br>`;
          }
        });

        resT += +(total.value || '');
        resF += +(final.value || '');

        res.innerHTML += `( ${resStrT} + ${total.value || ''} ) x ( ${resStrF} + ${final.value || ''} )<br>`;
        res.innerHTML += `result:${Math.floor(resT * Math.max(resF, 1))}`;
      };

      [1, 2, 3].forEach(no => {
        const r = document.createDocumentFragment();
        const d = document.createElement('div');

        const to = document.createElement('input');
        to.setAttribute('id', 'trigger-' + no + '-total');
        to.setAttribute('type', 'text');
        const fi = document.createElement('input');
        fi.setAttribute('id', 'trigger-' + no + '-final');
        fi.setAttribute('type', 'text');
        d.append(' + ');
        d.appendChild(to);
        d.append(' x ');
        d.appendChild(fi);
        d.appendChild(document.createElement('br'));

        ['always', 'odd', 'even'].forEach(t => {
          const label = document.createElement('label');
          const radio = document.createElement('input');
          radio.setAttribute('type', 'radio');
          radio.setAttribute('name', 'trigger-' + no);
          radio.setAttribute('value', t);
          radio.addEventListener('change', setRes);
          label.appendChild(radio);
          label.append(t);
          d.appendChild(label);
        });
        const n = document.createElement('input');
        n.setAttribute('id', 'trigger-' + no + '-no');
        n.setAttribute('value', 2);
        n.setAttribute('type', 'number');
        d.appendChild(n);
        d.appendChild(document.createElement('hr'));

        [1, 2, 3, 4, 5, 6].forEach(dice => {
          const label = document.createElement('label');
          const radio = document.createElement('input');
          radio.setAttribute('type', 'radio');
          radio.setAttribute('name', 'trigger-' + no + '-dice');
          radio.setAttribute('value', dice);
          radio.addEventListener('change', setRes);
          label.appendChild(radio);
          label.append(dice);
          d.appendChild(label);
        });

        r.appendChild(d);
        calc.append(r);
      });

      const loadPreset = setNo => {
        clearTextInput();
        const set = JSON.parse(localStorage.getItem('preset' + setNo) || '[]');
        setpresetNo.value = setNo;
        if (set.length) {
          res.innerHTML = 'clean result after switch preset';
          set.forEach((s, n) => {
            const no = n + 1;
            const { to, fi, ty, cn } = s;
            document.querySelector('#trigger-' + no + '-total').value = to || '';
            document.querySelector('#trigger-' + no + '-final').value = fi || '';
            document.querySelectorAll('input[name="trigger-' + no + '"]')[ty - 1].checked = true;
            document.querySelector('#trigger-' + no + '-no').value = cn || '';
          });
        } else {
          setpanel.open = true;
          res.innerHTML = `input preset${setNo} on above panel`;
        }
      };

      const setupPreset = () => {
        try {
          const setNo = setpresetNo.value;
          const getCard = cardNo => {
            const [to, fi, ty, cn] = ['to', 'fi', 'ty', 'cn'].map(k => {
              return document.querySelector(`#setpresetCard${cardNo}-${k}`)?.value;
            });

            if (!to && !fi) {
              throw `Are you sure in line Card${cardNo}, there is no total & final???`;
            }

            if (ty != 1 && !cn) {
              throw `Are you sure in line Card${cardNo}, the "ty" is right???`;
            }

            return { to, fi, ty, cn };
          };
          localStorage.setItem(
            'preset' + setNo,
            JSON.stringify([getCard(1), getCard(2), getCard(3)]),
          );
          res.innerHTML = `set up preset${setNo} success`;
        } catch (error) {
          res.innerHTML = `<span style='color:red'>${error}</span>`;
        }
      };

      const clearPreset = () => {
        const setNo = setpresetNo.value;
        localStorage.removeItem('preset' + setNo);
        clearTextInput();
        res.innerHTML = `clear preset${setNo} success`;
      };

      const clearTextInput = () => {
        document.querySelectorAll('body>div input[type="text"]')?.forEach(i => (i.value = ''));
      };

      const booooom = () => {
        clearTextInput();
        setpanel.open = false;
        localStorage.clear();
        res.innerHTML = `<p style='background-color: rgba(255, 47, 47, 0.778); color: rgba(255, 255, 35, 0.842);padding: 24px;border-radius: 20px;text-align: center;'>BOOOOOOOM...... ALL CLEAR! YOU ARE SAFE NOW!</p>`;
      };

      const egg = document.querySelector('#egg');

      const buildTracker = () => {
        let tracker = localStorage.getItem('egg_track') || '';
        if (tracker) {
          tracker = JSON.parse(tracker);
        } else {
          tracker = [
            { job: 'BowMaster' },
            { job: 'Shade' },
            { job: 'Aran' },
            { job: 'Drk' },
            { job: 'Hayato' },
            { job: 'MarksMan' },
            { job: 'Bucc' },
          ];
        }
        tracker.forEach(t => {
          const d = document.createElement('div');
          d.classList.add('tracker-line');
          d.append(t.job);
          const l1 = document.createElement('label');
          const c1 = document.createElement('input');
          c1.setAttribute('type', 'checkbox');
          c1.checked = !!t.egg;
          c1.setAttribute('value', t.job);
          l1.append('egg');
          l1.appendChild(c1);
          d.appendChild(l1);

          const l2 = document.createElement('label');
          const c2 = document.createElement('input');
          c2.setAttribute('type', 'checkbox');
          c2.checked = !!t.flag;

          l2.append('flag');
          l2.appendChild(c2);
          d.appendChild(l2);

          egg.appendChild(d);
        });
      };
      buildTracker();
      const saveTracker = () => {
        const allData = document.querySelectorAll('#egg input');
        const t = [];
        for (let l = 0; l < allData.length; l += 2) {
          const egg = allData[l];
          const flag = allData[l + 1];
          t.push({
            job: egg.value,
            egg: egg.checked,
            flag: flag.checked,
          });
        }
        localStorage.setItem('egg_track', JSON.stringify(t));
      };
      const clearTracker = () => {
        document.querySelectorAll('#egg input').forEach(i => (i.checked = false));
      };
    </script>
  </body>
</html>
